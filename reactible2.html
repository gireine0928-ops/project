<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>반응형 날씨 지도</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:sans-serif;
}

#map{
    width:100%;
    height:100vh;
}

.weather-marker{
    font-size:34px;
    cursor:pointer;
    user-select:none;
    display:flex;
    align-items:center;
    justify-content:center;
}

.weather-marker:hover{
    animation:shake .4s ease-in-out;
}

@keyframes shake{

    0%{transform:rotate(0deg);}
    25%{transform:rotate(-8deg);}
    50%{transform:rotate(8deg);}
    75%{transform:rotate(-5deg);}
    100%{transform:rotate(0deg);}
}

.weather-popup{
    min-width:220px;
}

.weather-popup h3{
    margin-bottom:8px;
}

.weather-popup p{
    margin:4px 0;
}

.loading{
    text-align:center;
    padding:10px;
}

@media (max-width:768px){

    .weather-popup{
        min-width:120px;
        text-align:center;
    }

    .weather-popup h3{
        font-size:14px;
    }

    .weather-popup p{
        font-size:13px;
    }

}

</style>
</head>
<body>

<div
id="map"
role="application"
aria-label="실시간 날씨 지도">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/**********************
 OpenWeatherMap API KEY
***********************/
const API_KEY = "f738d53ea69e7fdd825364d81d17af21";

/**********************
 도시 목록
***********************/
const cities = [

{
    name:"서울",
    query:"Seoul",
    lat:37.5665,
    lon:126.9780
},

{
    name:"부산",
    query:"Busan",
    lat:35.1796,
    lon:129.0756
},

{
    name:"제주",
    query:"Jeju",
    lat:33.4996,
    lon:126.5312
},

{
    name:"도쿄",
    query:"Tokyo",
    lat:35.6762,
    lon:139.6503
},

{
    name:"오사카",
    query:"Osaka",
    lat:34.6937,
    lon:135.5023
}

];

/**********************
 지도 생성
***********************/
const map = L.map("map").setView(
    [36.3,127.8],
    6
);

L.tileLayer(
    "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        attribution:"© OpenStreetMap"
    }
).addTo(map);

/**********************
 모바일 여부
***********************/
function isMobile(){
    return window.innerWidth <= 768;
}

/**********************
 날씨 이모지
***********************/
function getEmoji(main){

    main = main.toLowerCase();

    if(main.includes("clear")) return "☀️";
    if(main.includes("cloud")) return "☁️";
    if(main.includes("rain")) return "🌧️";
    if(main.includes("drizzle")) return "🌦️";
    if(main.includes("snow")) return "❄️";
    if(main.includes("thunder")) return "⛈️";
    if(main.includes("mist")) return "🌫️";

    return "🌍";
}

/**********************
 팝업 생성
***********************/
function createPopup(data, emoji){

    if(isMobile()){

        return `
        <div class="weather-popup">

            <div style="font-size:38px">
                ${emoji}
            </div>

            <h3>${data.name}</h3>

            <p>🌡️ ${Math.round(data.main.temp)}°</p>

            <p>💧 ${data.main.humidity}</p>

            <p>🌬️ ${data.wind.speed}</p>

        </div>
        `;
    }

    return `
    <div class="weather-popup">

        <h3>${data.name}</h3>

        <p>${emoji} ${data.weather[0].description}</p>

        <p>🌡️ 기온 : ${data.main.temp}°C</p>

        <p>🤗 체감온도 : ${data.main.feels_like}°C</p>

        <p>💧 습도 : ${data.main.humidity}%</p>

        <p>🌬️ 풍속 : ${data.wind.speed} m/s</p>

    </div>
    `;
}

/**********************
 현재 위치
***********************/
if(navigator.geolocation){

    navigator.geolocation.getCurrentPosition(

        position=>{

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            L.marker([lat,lon])
                .addTo(map)
                .bindPopup("📍 현재 위치");

        }

    );

}

/**********************
 마커 생성
***********************/
cities.forEach(city=>{

    const icon = L.divIcon({

        html:`
        <div
        class="weather-marker"
        tabindex="0"
        aria-label="${city.name}">
            📍
        </div>
        `,

        className:"",
        iconSize:[40,40]

    });

    const marker = L.marker(
        [city.lat, city.lon],
        {
            icon:icon,
            title:city.name
        }
    ).addTo(map);

    async function loadWeather(){

        marker.bindPopup(
            `<div class="loading">날씨 불러오는 중...</div>`
        ).openPopup();

        try{

            const response =
            await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city.query}&appid=${API_KEY}&units=metric&lang=kr`
            );

            if(!response.ok){
                throw new Error("API 오류");
            }

            const data =
            await response.json();

            const emoji =
            getEmoji(
                data.weather[0].main
            );

            marker.setIcon(
                L.divIcon({

                    html:`
                    <div
                    class="weather-marker"
                    tabindex="0">
                        ${emoji}
                    </div>
                    `,

                    className:"",
                    iconSize:[40,40]

                })
            );

            marker.setPopupContent(
                createPopup(data,emoji)
            );

        }
        catch(error){

            marker.setPopupContent(
                `
                <div class="weather-popup">
                    <b>${city.name}</b><br><br>
                    날씨 정보를 가져올 수 없습니다.
                </div>
                `
            );

        }

    }

    marker.on("click", loadWeather);

});

/**********************
 반응형 대응
***********************/
window.addEventListener(
    "resize",
    ()=>{
        map.invalidateSize();
    }
);

</script>

</body>
</html>
